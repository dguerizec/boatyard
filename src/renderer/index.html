<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boatyard</title>
    <link rel="icon" href="./assets/boatyard-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <h1>Boatyard</h1>
          <p>Project dock</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="manual-tour" class="secondary-button" type="button">Tour</button>
        <button id="global-view" class="secondary-button" type="button">Global</button>
      </div>
    </header>

    <div class="app-shell">
      <aside class="sidebar" aria-label="Projects">
        <div id="sidebar-update-notice" class="sidebar-update-notice" hidden></div>

        <div class="sidebar-section">
          <h2>Workspace</h2>
          <div id="global-nav-row" class="global-nav-row">
            <button id="global-nav" class="nav-item active" type="button">
              <span>Global</span>
              <small>System overview</small>
            </button>
            <button id="global-settings" class="global-settings-button" type="button" aria-label="Global settings" title="Global settings">⚙</button>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-heading">
            <h2>Projects</h2>
            <div class="section-heading-actions">
              <span id="project-count">0</span>
              <button id="add-project" class="icon-button" type="button" aria-label="Add project">+</button>
            </div>
          </div>
          <label class="project-search">
            <span class="sr-only">Search projects</span>
            <input id="project-search" type="search" placeholder="Search projects" autocomplete="off">
          </label>
          <div id="project-list" class="project-list"></div>
        </div>
      </aside>

      <main class="workspace" aria-label="Dashboard">
        <section class="workspace-header">
          <div>
            <p id="workspace-kicker" class="kicker">Global</p>
            <h2 id="workspace-title">System overview</h2>
          </div>
          <p id="workspace-summary" class="workspace-summary"></p>
        </section>

        <section id="dashboard-grid" class="dashboard-grid"></section>
      </main>
    </div>

    <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="../shared/boatyardManual.js"></script>
    <script src="./widgetRegistry.js"></script>
    <script src="./pluginRegistry.js"></script>
    <script src="./pluginSettingsFields.js"></script>
    <script src="./pluginLoader.js"></script>
    <script src="./terminalSurfaces.js"></script>
    <script src="./widgetSurfaces.js"></script>
    <script src="./projectSettingsViews.js"></script>
    <script src="./globalSettingsViews.js"></script>
    <script src="./onboardingTour.js"></script>
    <script src="./updateViews.js"></script>
    <script src="./paneLayoutState.js"></script>
    <script src="./paneLayoutView.js"></script>
    <script src="./webAppSurfaces.js"></script>
    <script src="./webAppMenus.js"></script>
    <script src="./projectSidebar.js"></script>
    <script type="module" src="../renderer-esm/renderer.js"></script>
  </body>
</html>
