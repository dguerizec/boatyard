name: Build macOS artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach macOS artifacts to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  mac:
    name: macOS DMG and zip
    runs-on: macos-13
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build macOS artifacts
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dashtop-macos-x64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error

      - name: Publish macOS artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${{ inputs.tag }}"
          mapfile -t files < <(find dist -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.zip" -o -name "latest-mac.yml" \) -print | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No macOS release files found."
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --verify-tag --title "$tag"
          fi
