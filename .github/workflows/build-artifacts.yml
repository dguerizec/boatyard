name: Build artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish artifacts to"
        required: false
        type: string

permissions:
  contents: write

jobs:
  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Linux artifact
        run: npm run dist:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashtop-linux-x64
          path: |
            dist/*.AppImage
            dist/latest-linux.yml
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - linux
    if: github.ref_type == 'tag' || inputs.tag != ''

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME}"
          fi

          mapfile -t files < <(find release-artifacts -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.zip" -o -name "latest-*.yml" \) -print | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --verify-tag --title "$tag"
          fi
